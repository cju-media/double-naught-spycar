<!--
    Embed Loader for Squarespace / WordPress

    1. Replace 'YOUR_GITHUB_PAGES_URL' with the actual URL where your 'homepage.html' is hosted.
       Example: https://your-username.github.io/your-repo-name/homepage.html

    2. Copy the code below and paste it into a Code Block or HTML Embed widget on your site.
-->

<div id="homepage-embed-container" style="position: relative; width: 100%; height: 100vh; overflow: hidden;">
    <iframe
        src="YOUR_GITHUB_PAGES_URL"
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;"
        allow="autoplay"
        title="Homepage Slideshow">
    </iframe>
</div>
