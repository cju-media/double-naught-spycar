<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        #slideshow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999;
        }

        #audio-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            color: white;
            z-index: 1000;
            cursor: pointer;
            user-select: none;
        }

        #audio-controls:hover {
            background: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <canvas id="slideshow-canvas"></canvas>

    <div id="audio-controls">
        <span id="play-pause">Play Music</span>
        <audio id="bg-audio"></audio>
    </div>

    <script>
        (function() {
            const init = () => {
                const REPO_BASE_URL = 'https://raw.githubusercontent.com/cju-media/double-naught-spycar/main/';
                const mediaListUrl = REPO_BASE_URL + 'assets/media_list.json';
                const canvas = document.getElementById('slideshow-canvas');
                const ctx = canvas.getContext('2d');
                const audioPlayer = document.getElementById('bg-audio');
                const playPauseBtn = document.getElementById('play-pause');

                // If elements are missing (e.g., failed injection), exit early to avoid errors
                if (!canvas || !audioPlayer || !playPauseBtn) return;

                let images = [];
                let loadedImages = [];
                let currentSlide = 0;
                let nextSlideIndex = 0;
                let opacity = 0;
                let transitionActive = false;
                let audioTracks = [];
                let currentAudioIndex = 0;

                // Fetch media list
                fetch(mediaListUrl)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Network response was not ok: ' + response.statusText);
                        }
                        return response.json();
                    })
                    .then(data => {
                        if (data.images && data.images.length > 0) {
                            // Encode URI components to handle spaces in filenames
                            images = data.images.map(img => REPO_BASE_URL + encodeURI(img));
                            // Randomize starting slide
                            currentSlide = Math.floor(Math.random() * images.length);
                            preloadImages();
                        } else {
                            console.error('No images found in list');
                        }

                        if (data.audio && data.audio.length > 0) {
                            // Encode URI components to handle spaces in filenames
                            audioTracks = data.audio.map(track => REPO_BASE_URL + encodeURI(track));
                            // Randomize starting audio
                            currentAudioIndex = Math.floor(Math.random() * audioTracks.length);
                            playTrack(currentAudioIndex);
                        } else {
                             console.error('No audio found in list');
                             playPauseBtn.style.display = 'none';
                        }
                    })
                    .catch(err => {
                        console.error('Error loading media list:', err);
                    });

                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    if (loadedImages.length > 0) {
                        drawImageCover(ctx, loadedImages[currentSlide]);
                    }
                }

                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();

                function preloadImages() {
                    let loadedCount = 0;
                    images.forEach((src, index) => {
                        const img = new Image();
                        img.src = src;
                        img.onload = () => {
                            loadedImages[index] = img;
                            loadedCount++;
                            if (loadedCount === images.length) {
                                startSlideshow();
                            }
                        };
                        // Handle partial loading if some fail? For now assume all load or basic fallback
                    });
                }

                function drawImageCover(ctx, img, globalAlpha = 1.0) {
                    if (!img) return;
                    ctx.globalAlpha = globalAlpha;

                    // Calculate aspect ratio to cover
                    const imgRatio = img.width / img.height;
                    const canvasRatio = canvas.width / canvas.height;
                    let renderWidth, renderHeight, offsetX, offsetY;

                    if (canvasRatio > imgRatio) {
                        renderWidth = canvas.width;
                        renderHeight = canvas.width / imgRatio;
                        offsetX = 0;
                        offsetY = (canvas.height - renderHeight) / 2;
                    } else {
                        renderWidth = canvas.height * imgRatio;
                        renderHeight = canvas.height;
                        offsetX = (canvas.width - renderWidth) / 2;
                        offsetY = 0;
                    }

                    ctx.drawImage(img, offsetX, offsetY, renderWidth, renderHeight);
                }

                function startSlideshow() {
                    // Initial draw
                    drawImageCover(ctx, loadedImages[currentSlide]);

                    if (images.length > 1) {
                        setInterval(() => {
                            nextSlideIndex = (currentSlide + 1) % loadedImages.length;
                            transitionActive = true;
                            opacity = 0;
                            requestAnimationFrame(animateTransition);
                        }, 5000);
                    }
                }

                function animateTransition() {
                    if (!transitionActive) return;

                    opacity += 0.02; // Adjust speed here
                    if (opacity >= 1) {
                        opacity = 1;
                        transitionActive = false;
                        currentSlide = nextSlideIndex;
                    }

                    // Clear and draw current slide
                    ctx.globalAlpha = 1.0;
                    ctx.clearRect(0,0, canvas.width, canvas.height);

                    // Draw outgoing slide
                    drawImageCover(ctx, loadedImages[currentSlide]);

                    // Draw incoming slide on top with opacity
                    drawImageCover(ctx, loadedImages[nextSlideIndex], opacity);

                    if (transitionActive) {
                        requestAnimationFrame(animateTransition);
                    }
                }

                function playTrack(index) {
                    if (audioTracks.length === 0) return;
                    currentAudioIndex = index;
                    audioPlayer.src = audioTracks[currentAudioIndex];
                    
                    // Attempt to autoplay (might be blocked by browser)
                    audioPlayer.play().then(() => {
                            playPauseBtn.textContent = 'Pause Music';
                    }).catch(e => {
                        console.log('Autoplay blocked, user interaction required.');
                        playPauseBtn.textContent = 'Play Music';
                    });
                }

                function nextTrack() {
                    if (audioTracks.length === 0) return;
                    currentAudioIndex = (currentAudioIndex + 1) % audioTracks.length;
                    playTrack(currentAudioIndex);
                }

                const togglePlay = () => {
                    if (audioPlayer.paused) {
                        audioPlayer.play();
                        playPauseBtn.textContent = 'Pause Music';
                    } else {
                        audioPlayer.pause();
                        playPauseBtn.textContent = 'Play Music';
                    }
                };

                document.getElementById('audio-controls').addEventListener('click', togglePlay);
                audioPlayer.addEventListener('ended', nextTrack);
            };

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
