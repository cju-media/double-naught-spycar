<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        #slideshow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999;
            background-color: #000;
        }

        #audio-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            color: white;
            z-index: 1000;
            cursor: pointer;
            user-select: none;
        }

        #audio-controls:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        #navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 20px;
            z-index: 1001;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            box-sizing: border-box;
        }

        #navbar h1 {
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #navbar ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
        }

        #navbar a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        #navbar a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <h1>Double Naught Spycar</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <canvas id="slideshow-canvas"></canvas>

    <div id="audio-controls">
        <span id="play-pause">Play Music</span>
        <audio id="bg-audio"></audio>
    </div>

    <script>
        (function() {
            const init = () => {
                const REPO_BASE_URL = 'https://raw.githubusercontent.com/cju-media/double-naught-spycar/main/';
                const mediaListUrl = REPO_BASE_URL + 'assets/media_list.json';
                const canvas = document.getElementById('slideshow-canvas');
                const ctx = canvas.getContext('2d');
                const audioPlayer = document.getElementById('bg-audio');
                const playPauseBtn = document.getElementById('play-pause');
                const navbar = document.getElementById('navbar');

                // If elements are missing (e.g., failed injection), exit early to avoid errors
                if (!canvas || !audioPlayer || !playPauseBtn || !navbar) return;

                let images = [];
                let loadedImages = [];
                let audioTracks = [];
                let currentAudioIndex = 0;

                let GRID_SIZE = 8;
                let gridLayout = [];

                function getGridSizeForWidth(width) {
                    if (width < 600) {
                        return 5;
                    } else {
                        return 8;
                    }
                }

                function getMaxImageSizeForGrid(gridSize) {
                    if (gridSize === 5) {
                        return 2;
                    } else {
                        return 4;
                    }
                }

                GRID_SIZE = getGridSizeForWidth(window.innerWidth);

                // Fetch media list
                fetch(mediaListUrl)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Network response was not ok: ' + response.statusText);
                        }
                        return response.json();
                    })
                    .then(data => {
                        if (data.images && data.images.length > 0) {
                            // Encode URI components to handle spaces in filenames
                            images = data.images.map(img => REPO_BASE_URL + encodeURI(img));
                            preloadImages();
                        } else {
                            console.error('No images found in list');
                        }

                        if (data.audio && data.audio.length > 0) {
                            // Encode URI components to handle spaces in filenames
                            audioTracks = data.audio.map(track => REPO_BASE_URL + encodeURI(track));
                            // Randomize starting audio
                            currentAudioIndex = Math.floor(Math.random() * audioTracks.length);
                            playTrack(currentAudioIndex);
                        } else {
                             console.error('No audio found in list');
                             playPauseBtn.style.display = 'none';
                        }
                    })
                    .catch(err => {
                        console.error('Error loading media list:', err);
                    });

                function resizeCanvas() {
                    const newGridSize = getGridSizeForWidth(window.innerWidth);
                    let needsLayout = false;

                    if (newGridSize !== GRID_SIZE) {
                        GRID_SIZE = newGridSize;
                        needsLayout = true;
                    }

                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;

                    if (loadedImages.length > 0) {
                        if (needsLayout) {
                            generateLayout();
                        } else if (gridLayout.length > 0 && !isAnimating) {
                            drawLayout();
                        }
                    }
                }

                window.addEventListener('resize', resizeCanvas);
                // Initial set up
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                let isAnimating = false;

                function preloadImages() {
                    let loadedCount = 0;
                    images.forEach((src, index) => {
                        const img = new Image();
                        img.src = src;
                        img.onload = () => {
                            loadedImages[index] = img;
                            loadedCount++;
                            if (loadedCount === images.length) {
                                startGrid();
                            }
                        };
                        // Handle partial loading if some fail? For now assume all load or basic fallback
                    });
                }

                function generateLayout() {
                    gridLayout = [];
                    // Initialize grid
                    let grid = [];
                    for (let r = 0; r < GRID_SIZE; r++) {
                        grid[r] = new Array(GRID_SIZE).fill(false);
                    }

                    const maxImgSize = getMaxImageSizeForGrid(GRID_SIZE);

                    // Loop through each cell
                    for (let r = 0; r < GRID_SIZE; r++) {
                        for (let c = 0; c < GRID_SIZE; c++) {
                            if (grid[r][c]) continue; // Already occupied

                            // Determine random size
                            let targetW = Math.floor(Math.random() * maxImgSize) + 1; // 1 to maxImgSize
                            let targetH = Math.floor(Math.random() * maxImgSize) + 1; // 1 to maxImgSize

                            // Check if targetW/targetH fits at (r,c)
                            let fits = true;
                            if (r + targetH > GRID_SIZE || c + targetW > GRID_SIZE) {
                                fits = false;
                            } else {
                                for (let i = 0; i < targetH; i++) {
                                    for (let j = 0; j < targetW; j++) {
                                        if (grid[r + i][c + j]) {
                                            fits = false;
                                            break;
                                        }
                                    }
                                    if (!fits) break;
                                }
                            }

                            let bestW, bestH;
                            if (fits) {
                                bestW = targetW;
                                bestH = targetH;
                            } else {
                                // Fallback to 1x1. Always fits because grid[r][c] is false.
                                bestW = 1;
                                bestH = 1;
                            }

                            // Mark grid
                            for (let i = 0; i < bestH; i++) {
                                for (let j = 0; j < bestW; j++) {
                                    grid[r + i][c + j] = true;
                                }
                            }

                            // Pick random image or gray block (25% chance)
                            let imgIndex;
                            if (Math.random() < 0.25) {
                                imgIndex = -2; // -2 represents a gray block
                            } else {
                                imgIndex = Math.floor(Math.random() * loadedImages.length);
                            }

                            gridLayout.push({
                                imgIndex: imgIndex,
                                r: r,
                                c: c,
                                w: bestW,
                                h: bestH,
                                nextImgIndex: -1,
                                opacity: 1.0 // 1 means full opacity of imgIndex. If transitioning, this will drop to 0, and we crossfade nextImgIndex
                            });
                        }
                    }

                    drawLayout();
                }

                function drawLayout() {
                    if (!loadedImages.length) return;

                    const cellW = canvas.width / GRID_SIZE;
                    const cellH = canvas.height / GRID_SIZE;

                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    gridLayout.forEach(item => {
                        // Calculate positions with slight overlap or rounding to prevent gaps
                        const x = Math.floor(item.c * cellW);
                        const y = Math.floor(item.r * cellH);
                        // Ensure width/height reaches the next grid line exactly
                        const w = Math.ceil((item.c + item.w) * cellW) - x;
                        const h = Math.ceil((item.r + item.h) * cellH) - y;

                        // Draw current item (fading out)
                        if (item.imgIndex !== -1) {
                            ctx.globalAlpha = item.opacity;
                            if (item.imgIndex === -2) {
                                drawGrayRect(ctx, x, y, w, h);
                            } else if (item.imgIndex >= 0) {
                                drawImageInRect(ctx, loadedImages[item.imgIndex], x, y, w, h);
                            }
                        }

                        // Draw next item (fading in)
                        if (item.nextImgIndex !== -1) {
                            ctx.globalAlpha = 1.0 - item.opacity;
                            if (item.nextImgIndex === -2) {
                                drawGrayRect(ctx, x, y, w, h);
                            } else if (item.nextImgIndex >= 0) {
                                drawImageInRect(ctx, loadedImages[item.nextImgIndex], x, y, w, h);
                            }
                        }
                    });

                    ctx.globalAlpha = 1.0;
                }

                function drawGrayRect(ctx, x, y, w, h) {
                    ctx.fillStyle = '#808080';
                    ctx.fillRect(x, y, w, h);
                }

                function drawImageInRect(ctx, img, x, y, w, h) {
                    if (!img) return;

                    const imgRatio = img.width / img.height;
                    const rectRatio = w / h;

                    let sx, sy, sWidth, sHeight;

                    if (rectRatio > imgRatio) {
                        // Rect is wider than image (relative to aspect), so crop top/bottom
                        sWidth = img.width;
                        sHeight = img.width / rectRatio;
                        sx = 0;
                        sy = (img.height - sHeight) / 2;
                    } else {
                        // Rect is taller, crop sides
                        sHeight = img.height;
                        sWidth = img.height * rectRatio;
                        sy = 0;
                        sx = (img.width - sWidth) / 2;
                    }

                    ctx.drawImage(img, sx, sy, sWidth, sHeight, x, y, w, h);
                }

                function animate() {
                    let stillAnimating = false;

                    gridLayout.forEach(item => {
                        if (item.nextImgIndex !== -1) {
                            item.opacity -= 0.02; // Fade speed
                            if (item.opacity <= 0) {
                                item.opacity = 1.0;
                                item.imgIndex = item.nextImgIndex;
                                item.nextImgIndex = -1;
                            } else {
                                stillAnimating = true;
                            }
                        }
                    });

                    drawLayout();

                    if (stillAnimating) {
                        isAnimating = true;
                        requestAnimationFrame(animate);
                    } else {
                        isAnimating = false;
                    }
                }

                function startGrid() {
                    generateLayout();

                    // 10% chance for an image to change randomly every 3 seconds
                    setInterval(() => {
                        let changeCount = 0;
                        gridLayout.forEach(item => {
                            if (item.nextImgIndex === -1 && Math.random() < 0.1) {
                                let newIndex;
                                // Decide if new item is gray or image (25% chance gray)
                                if (Math.random() < 0.25) {
                                    newIndex = -2;
                                } else {
                                    // Pick a new image that is different from the current one (if possible)
                                    // If current is gray (-2), any image is different.
                                    // If current is image, pick distinct image.
                                    do {
                                        newIndex = Math.floor(Math.random() * loadedImages.length);
                                    } while (loadedImages.length > 1 && newIndex === item.imgIndex);
                                }

                                // Only update if actually different (e.g. gray to gray doesn't need anim, though random chance makes it rare)
                                if (newIndex !== item.imgIndex) {
                                    item.nextImgIndex = newIndex;
                                    changeCount++;
                                }
                            }
                        });

                        if (changeCount > 0 && !isAnimating) {
                            console.log(`Grid update: ${changeCount} images changing.`);
                            animate();
                        }
                    }, 3000);
                }

                function playTrack(index) {
                    if (audioTracks.length === 0) return;
                    currentAudioIndex = index;
                    audioPlayer.src = audioTracks[currentAudioIndex];
                    
                    // Attempt to autoplay (might be blocked by browser)
                    audioPlayer.play().then(() => {
                            playPauseBtn.textContent = 'Pause Music';
                    }).catch(e => {
                        console.log('Autoplay blocked, user interaction required.');
                        playPauseBtn.textContent = 'Play Music';
                    });
                }

                function nextTrack() {
                    if (audioTracks.length === 0) return;
                    currentAudioIndex = (currentAudioIndex + 1) % audioTracks.length;
                    playTrack(currentAudioIndex);
                }

                const togglePlay = () => {
                    if (audioPlayer.paused) {
                        audioPlayer.play();
                        playPauseBtn.textContent = 'Pause Music';
                    } else {
                        audioPlayer.pause();
                        playPauseBtn.textContent = 'Play Music';
                    }
                };

                document.getElementById('audio-controls').addEventListener('click', togglePlay);
                audioPlayer.addEventListener('ended', nextTrack);

                // Navbar Reveal Logic
                let navTimeout;

                const showNavbar = () => {
                    navbar.style.opacity = '1';

                    if (navTimeout) {
                        clearTimeout(navTimeout);
                    }

                    navTimeout = setTimeout(() => {
                        navbar.style.opacity = '0';
                    }, 3000); // Hide after 3 seconds of inactivity
                };

                window.addEventListener('mousemove', showNavbar);
                window.addEventListener('touchstart', showNavbar);
                window.addEventListener('touchmove', showNavbar);
            };

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
