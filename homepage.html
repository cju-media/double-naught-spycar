<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        #slideshow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        #audio-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            color: white;
            z-index: 10;
            cursor: pointer;
            user-select: none;
        }

        #audio-controls:hover {
            background: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div id="slideshow-container">
        <!-- Slides will be injected here -->
    </div>

    <div id="audio-controls">
        <span id="play-pause">Play Music</span>
        <audio id="bg-audio" loop></audio>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const REPO_BASE_URL = 'https://raw.githubusercontent.com/cju-media/double-naught-spycar/main/';
            const mediaListUrl = REPO_BASE_URL + 'assets/media_list.json';
            const slideshowContainer = document.getElementById('slideshow-container');
            const audioPlayer = document.getElementById('bg-audio');
            const playPauseBtn = document.getElementById('play-pause');

            let images = [];
            let currentSlide = 0;

            // Fetch media list
            fetch(mediaListUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.images && data.images.length > 0) {
                        images = data.images.map(img => REPO_BASE_URL + img);
                        initSlideshow();
                    } else {
                        console.error('No images found in list');
                        slideshowContainer.innerHTML = '<p style="color:white; text-align:center; padding-top: 20%;">No images available</p>';
                    }

                    if (data.audio && data.audio.length > 0) {
                        const randomAudio = data.audio[Math.floor(Math.random() * data.audio.length)];
                        audioPlayer.src = REPO_BASE_URL + randomAudio;
                        // Attempt to autoplay (might be blocked by browser)
                        audioPlayer.play().then(() => {
                             playPauseBtn.textContent = 'Pause Music';
                        }).catch(e => {
                            console.log('Autoplay blocked, user interaction required.');
                            playPauseBtn.textContent = 'Play Music';
                        });
                    } else {
                         console.error('No audio found in list');
                         playPauseBtn.style.display = 'none';
                    }
                })
                .catch(err => {
                    console.error('Error loading media list:', err);
                    slideshowContainer.innerHTML = '<p style="color:white; text-align:center; padding-top: 20%;">Media list not found. Please run the download script.</p>';
                });

            function initSlideshow() {
                // Create a div for each image
                images.forEach((src, index) => {
                    const slide = document.createElement('div');
                    slide.classList.add('slide');
                    slide.style.backgroundImage = `url('${src}')`;
                    if (index === 0) slide.classList.add('active');
                    slideshowContainer.appendChild(slide);
                });

                if (images.length > 1) {
                    setInterval(nextSlide, 5000); // Change every 5 seconds
                }
            }

            function nextSlide() {
                const slides = document.querySelectorAll('.slide');
                if (slides.length === 0) return;

                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }

            const togglePlay = () => {
                if (audioPlayer.paused) {
                    audioPlayer.play();
                    playPauseBtn.textContent = 'Pause Music';
                } else {
                    audioPlayer.pause();
                    playPauseBtn.textContent = 'Play Music';
                }
            };

            document.getElementById('audio-controls').addEventListener('click', togglePlay);
        });
    </script>
</body>
</html>
