<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        #slideshow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999;
            background-color: #000;
        }

        #audio-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            color: white;
            z-index: 1000;
            cursor: pointer;
            user-select: none;
        }

        #audio-controls:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        #navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 20px;
            z-index: 1001;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            box-sizing: border-box;
        }

        #navbar h1 {
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #navbar ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
        }

        #navbar a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        #navbar a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <h1>Double Naught Spycar</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <canvas id="slideshow-canvas"></canvas>

    <div id="audio-controls">
        <span id="play-pause">Play Music</span>
        <audio id="bg-audio"></audio>
    </div>

    <script>
        (function() {
            const init = () => {
                const REPO_BASE_URL = 'https://raw.githubusercontent.com/cju-media/double-naught-spycar/main/';
                const mediaListUrl = REPO_BASE_URL + 'assets/media_list.json';
                const canvas = document.getElementById('slideshow-canvas');
                const ctx = canvas.getContext('2d');
                const audioPlayer = document.getElementById('bg-audio');
                const playPauseBtn = document.getElementById('play-pause');
                const navbar = document.getElementById('navbar');

                // If elements are missing (e.g., failed injection), exit early to avoid errors
                if (!canvas || !audioPlayer || !playPauseBtn || !navbar) return;

                let images = [];
                let loadedImages = [];
                let audioTracks = [];
                let currentAudioIndex = 0;

                let currentImgIndex = -1;
                let nextImgIndex = -1;
                let opacity = 1.0;

                // Fetch media list
                fetch(mediaListUrl)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Network response was not ok: ' + response.statusText);
                        }
                        return response.json();
                    })
                    .then(data => {
                        if (data.images && data.images.length > 0) {
                            // Encode URI components to handle spaces in filenames
                            images = data.images.map(img => REPO_BASE_URL + encodeURI(img));
                            preloadImages();
                        } else {
                            console.error('No images found in list');
                        }

                        if (data.audio && data.audio.length > 0) {
                            // Encode URI components to handle spaces in filenames
                            audioTracks = data.audio.map(track => REPO_BASE_URL + encodeURI(track));
                            // Randomize starting audio
                            currentAudioIndex = Math.floor(Math.random() * audioTracks.length);
                            playTrack(currentAudioIndex);
                        } else {
                             console.error('No audio found in list');
                             playPauseBtn.style.display = 'none';
                        }
                    })
                    .catch(err => {
                        console.error('Error loading media list:', err);
                    });

                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;

                    if (loadedImages.length > 0 && !isAnimating) {
                        drawLayout();
                    }
                }

                window.addEventListener('resize', resizeCanvas);
                // Initial set up
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                let isAnimating = false;

                function preloadImages() {
                    let loadedCount = 0;
                    images.forEach((src, index) => {
                        const img = new Image();
                        img.src = src;
                        img.onload = () => {
                            loadedImages[index] = img;
                            loadedCount++;
                            if (loadedCount === images.length) {
                                startSlideshow();
                            }
                        };
                        // Handle partial loading if some fail? For now assume all load or basic fallback
                    });
                }

                function drawLayout() {
                    if (!loadedImages.length) return;

                    // Fill background with gray
                    ctx.fillStyle = '#808080';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    const targetW = canvas.width * 0.75;
                    const targetH = canvas.height * 0.75;
                    const x = (canvas.width - targetW) / 2;
                    const y = (canvas.height - targetH) / 2;

                    // Draw current item (fading out)
                    if (currentImgIndex !== -1) {
                        ctx.globalAlpha = opacity;
                        drawImageInRect(ctx, loadedImages[currentImgIndex], x, y, targetW, targetH);
                    }

                    // Draw next item (fading in)
                    if (nextImgIndex !== -1) {
                        ctx.globalAlpha = 1.0 - opacity;
                        drawImageInRect(ctx, loadedImages[nextImgIndex], x, y, targetW, targetH);
                    }

                    ctx.globalAlpha = 1.0;
                }

                function drawImageInRect(ctx, img, x, y, w, h) {
                    if (!img) return;

                    const imgRatio = img.width / img.height;
                    const rectRatio = w / h;

                    let sx, sy, sWidth, sHeight;

                    if (rectRatio > imgRatio) {
                        // Rect is wider than image (relative to aspect), so crop top/bottom
                        sWidth = img.width;
                        sHeight = img.width / rectRatio;
                        sx = 0;
                        sy = (img.height - sHeight) / 2;
                    } else {
                        // Rect is taller, crop sides
                        sHeight = img.height;
                        sWidth = img.height * rectRatio;
                        sy = 0;
                        sx = (img.width - sWidth) / 2;
                    }

                    ctx.drawImage(img, sx, sy, sWidth, sHeight, x, y, w, h);
                }

                function animate() {
                    let stillAnimating = false;

                    if (nextImgIndex !== -1) {
                        opacity -= 0.02; // Fade speed
                        if (opacity <= 0) {
                            opacity = 1.0;
                            currentImgIndex = nextImgIndex;
                            nextImgIndex = -1;
                        } else {
                            stillAnimating = true;
                        }
                    }

                    drawLayout();

                    if (stillAnimating) {
                        isAnimating = true;
                        requestAnimationFrame(animate);
                    } else {
                        isAnimating = false;
                    }
                }

                function startSlideshow() {
                    if (loadedImages.length > 0) {
                        currentImgIndex = Math.floor(Math.random() * loadedImages.length);
                        drawLayout();

                        setInterval(() => {
                            if (loadedImages.length > 1 && nextImgIndex === -1) {
                                let newIndex;
                                do {
                                    newIndex = Math.floor(Math.random() * loadedImages.length);
                                } while (newIndex === currentImgIndex);

                                nextImgIndex = newIndex;
                                if (!isAnimating) {
                                    animate();
                                }
                            }
                        }, 3000);
                    }
                }

                function playTrack(index) {
                    if (audioTracks.length === 0) return;
                    currentAudioIndex = index;
                    audioPlayer.src = audioTracks[currentAudioIndex];
                    
                    // Attempt to autoplay (might be blocked by browser)
                    audioPlayer.play().then(() => {
                            playPauseBtn.textContent = 'Pause Music';
                    }).catch(e => {
                        console.log('Autoplay blocked, user interaction required.');
                        playPauseBtn.textContent = 'Play Music';
                    });
                }

                function nextTrack() {
                    if (audioTracks.length === 0) return;
                    currentAudioIndex = (currentAudioIndex + 1) % audioTracks.length;
                    playTrack(currentAudioIndex);
                }

                const togglePlay = () => {
                    if (audioPlayer.paused) {
                        audioPlayer.play();
                        playPauseBtn.textContent = 'Pause Music';
                    } else {
                        audioPlayer.pause();
                        playPauseBtn.textContent = 'Play Music';
                    }
                };

                document.getElementById('audio-controls').addEventListener('click', togglePlay);
                audioPlayer.addEventListener('ended', nextTrack);

                // Navbar Reveal Logic
                let navTimeout;
                let isHoveringNavbar = false;

                const showNavbar = () => {
                    navbar.style.opacity = '1';

                    if (navTimeout) {
                        clearTimeout(navTimeout);
                    }

                    if (!isHoveringNavbar) {
                        navTimeout = setTimeout(() => {
                            navbar.style.opacity = '0';
                        }, 3000); // Hide after 3 seconds of inactivity
                    }
                };

                window.addEventListener('mousemove', showNavbar);
                window.addEventListener('touchstart', showNavbar);
                window.addEventListener('touchmove', showNavbar);

                navbar.addEventListener('mouseenter', () => {
                    isHoveringNavbar = true;
                    if (navTimeout) {
                        clearTimeout(navTimeout);
                    }
                    navbar.style.opacity = '1';
                });

                navbar.addEventListener('mouseleave', () => {
                    isHoveringNavbar = false;
                    showNavbar(); // Restart timeout logic
                });
            };

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
